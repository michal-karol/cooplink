<div>
    <label class="label" for="{{ field_id }}">
        <span class="label-text">{{ label }}</span>
    </label>

    <select
        name="{{ field_name }}"
        id="{{ field_id }}"
        class="select select-bordered bg-base-100/70 w-full"
    >
        {% if empty_option_label %}
            <option value="">{{ empty_option_label }}</option>
        {% endif %}

        {% for option in options %}
            <option
                value="{{ option.id }}"
                {% if selected_value|stringformat:"s" == option.id|stringformat:"s" %}selected{% endif %}
            >
                {{ option.name }}
            </option>
        {% endfor %}
    </select>

    {% if help_text %}
        <label class="label">
            <span class="label-text-alt text-base-content/60">{{ help_text }}</span>
        </label>
    {% endif %}

    {% for error in errors %}
        <p class="text-sm text-error mt-1">{{ error }}</p>
    {% endfor %}
</div>
