name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up PostgreSQL
        uses: harmon758/postgresql-action@v1
        with:
          postgresql version: "17"
          postgresql db: cooplink_test
          postgresql user: cooplink
          postgresql password: cooplink

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: "127.0.0.1,localhost"
          DATABASE_URL: postgresql://cooplink:cooplink@localhost:5432/cooplink_test
        run: |
          python manage.py migrate

      - name: Run Django tests
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: "127.0.0.1,localhost"
          TEST_DATABASE_URL: postgresql://cooplink:cooplink@localhost:5432/cooplink_test
        run: |
          python manage.py test