services:
  db:
    image: postgres:17
    container_name: cooplink_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cooplink
      POSTGRES_USER: cooplink
      POSTGRES_PASSWORD: cooplink
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cooplink -d cooplink"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: cooplink_web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cooplink:cooplink@db:5432/cooplink
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"

volumes:
  postgres_data:
